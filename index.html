<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Stress Sim v0.1.0</title>
    <style>
        :root {
            --bg-deep: #0b0f1a;
            --sidebar-bg: #161c2d;
            --card-bg: #1e253a;
            --accent-blue: #3b82f6;
            --accent-red: #ef4444;
            --accent-purple: #8b5cf6;
            --text-main: #f1f5f9;
            --text-dim: #94a3b8;
        }

        body {
            background-color: var(--bg-deep);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* --- デバッグバー --- */
        #debug-bar {
            background: rgba(0, 0, 0, 0.8);
            height: 24px;
            font-size: 11px;
            font-family: monospace;
            display: flex;
            align-items: center;
            padding: 0 15px;
            gap: 20px;
            border-bottom: 1px solid #334155;
            color: #10b981;
            z-index: 100;
        }

        #main-container {
            display: flex;
            flex-grow: 1;
        }

        /* --- サイドバー --- */
        #sidebar {
            width: 320px;
            background-color: var(--sidebar-bg);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            box-shadow: 2px 0 15px rgba(0,0,0,0.4);
            overflow-y: auto;
        }

        .section-label { font-size: 13px; color: var(--text-dim); margin-bottom: 4px; }
        .val-display { float: right; color: var(--text-main); }

        select, button {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: none;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
        }

        select { background: var(--card-bg); color: white; appearance: none; }

        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        
        button { background: #334155; color: white; }
        button:hover { opacity: 0.9; }
        button.active { background: var(--accent-blue); outline: 2px solid #60a5fa; }
        button.active.del { background: #991b1b; outline: 2px solid #f87171; }
        
        button.kr-btn { background: var(--accent-purple); margin-top: 5px; }
        button.reset-btn { background: transparent; border: 1px solid #475569; color: var(--text-dim); }
        button.reset-btn:hover { background: #334155; color: white; }

        .stat-card-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .stat-card {
            background: rgba(0,0,0,0.2);
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #334155;
        }
        .stat-val { font-family: monospace; font-size: 16px; display: block; margin-top: 4px; }

        /* --- キャンバス --- */
        #viewport {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            background-image: 
                radial-gradient(circle at 50% 50%, #1e293b 0%, #0b0f1a 100%);
        }
        canvas { cursor: crosshair; }

        input[type="range"] {
            width: 100%;
            height: 6px;
            background: #334155;
            border-radius: 5px;
            outline: none;
        }
    </style>
</head>
<body>

<div id="debug-bar">
    <span>SYSTEM: READY</span>
    <span>VER: v0.1.0 (Major Refactor)</span>
    <span>ENGINE: FEM_LINEAR_CG</span>
    <span>STATUS: <span id="debug-status" style="color:#fbbf24">STABLE</span></span>
    <span>FPS: <span id="fps-val">60</span></span>
</div>

<div id="main-container">
    <div id="sidebar">
        <div>
            <div class="section-label">ヤング率 E <span class="val-display" id="e-label">200 GPa-like</span></div>
            <input type="range" id="e-slider" min="10" max="500" value="200">
        </div>

        <div>
            <div class="section-label">メッシュ</div>
            <select><option>高精細 40 x 12</option></select>
        </div>

        <div>
            <div class="section-label">形状プリセット</div>
            <select><option>手描き編集</option></select>
        </div>

        <div class="btn-grid">
            <button id="mode-add" class="active">描いて材料を追加</button>
            <button id="mode-del">削って穴にする</button>
        </div>

        <button style="opacity:0.5; cursor:not-allowed;">プリセット形状を適用</button>
        <button class="kr-btn">解いている行列 Kr を可視化</button>
        <button id="reset-btn" class="reset-btn">初期値に戻す</button>

        <div class="stat-card-grid">
            <div class="stat-card">
                <span class="section-label">最大変位</span>
                <span id="disp-val" class="stat-val">0.0000</span>
            </div>
            <div class="stat-card">
                <span class="section-label">最大応力</span>
                <span id="stress-val" class="stat-val">0.00e+0</span>
            </div>
        </div>
    </div>

    <div id="viewport">
        <canvas id="femCanvas"></canvas>
    </div>
</div>

<script>
/**
 * Stress Simulator v0.1.0
 */
const NX = 40;
const NY = 12;
const CANVAS_W = 800;
const CANVAS_H = 450;

let E = 200;
let grid = new Int8Array(NX * NY).fill(1);
let u = new Float64Array((NX + 1) * (NY + 1) * 2); 
let stress = new Float64Array(NX * NY);
let drawMode = 'add';

const canvas = document.getElementById('femCanvas');
const ctx = canvas.getContext('2d');
canvas.width = CANVAS_W;
canvas.height = CANVAS_H;

// --- FEM ソルバー (CG法) ---
function solve() {
    const numNodes = (NX + 1) * (NY + 1);
    const size = numNodes * 2;
    const f = new Float64Array(size);
    const r = new Float64Array(size);
    const p = new Float64Array(size);
    const Ap = new Float64Array(size);

    // 右端荷重 (先端荷重)
    const loadY = -0.15; 
    for (let j = 0; j <= NY; j++) {
        f[(NX * (NY + 1) + j) * 2 + 1] = loadY;
    }

    const multiplyA = (vin, vout) => {
        vout.fill(0);
        for (let i = 0; i < NX; i++) {
            for (let j = 0; j < NY; j++) {
                if (grid[i * NY + j] === 0) continue;
                
                const idxs = [
                    (i*(NY+1)+j), ((i+1)*(NY+1)+j), 
                    ((i+1)*(NY+1)+(j+1)), (i*(NY+1)+(j+1))
                ];

                for(let a of idxs) {
                    for(let b of idxs) {
                        if (a % (NY+1) === 0 && Math.floor(a/(NY+1)) === 0) continue; 
                        const stiff = (E * 0.08); 
                        vout[a*2]   += vin[b*2] * stiff;
                        vout[a*2+1] += vin[b*2+1] * stiff;
                    }
                }
            }
        }
        // 境界条件の固定化
        for(let j=0; j<=NY; j++) {
            vout[j*2] = vin[j*2];
            vout[j*2+1] = vin[j*2+1];
        }
    };

    // CG初期化
    multiplyA(u, Ap);
    for(let i=0; i<size; i++) { r[i] = f[i] - Ap[i]; p[i] = r[i]; }

    for(let iter=0; iter<40; iter++) {
        multiplyA(p, Ap);
        let rdotr = 0, pAp = 0;
        for(let i=0; i<size; i++) { rdotr += r[i]*r[i]; pAp += p[i]*Ap[i]; }
        if(pAp < 1e-10) break;
        let alpha = rdotr / pAp;
        let next_rdotr = 0;
        for(let i=0; i<size; i++) {
            u[i] += alpha * p[i];
            r[i] -= alpha * Ap[i];
            next_rdotr += r[i]*r[i];
        }
        if(next_rdotr < 1e-7) break;
        let beta = next_rdotr / rdotr;
        for(let i=0; i<size; i++) p[i] = r[i] + beta * p[i];
    }

    let maxS = 0;
    for(let i=0; i<NX; i++) {
        for(let j=0; j<NY; j++) {
            if(grid[i*NY+j] === 0) { stress[i*NY+j] = 0; continue; }
            const n0 = i*(NY+1)+j;
            const n1 = (i+1)*(NY+1)+j;
            const ds = Math.abs(u[n1*2+1] - u[n0*2+1]) + Math.abs(u[n1*2] - u[n0*2]);
            stress[i*NY+j] = ds * E * 50;
            if(stress[i*NY+j] > maxS) maxS = stress[i*NY+j];
        }
    }
    return maxS;
}

// --- 描画 ---
function getRainbowColor(v, max) {
    if(max === 0) return '#1e293b';
    const ratio = Math.min(v/max, 1.0);
    const h = (1.0 - ratio) * 240;
    return `hsla(${h}, 80%, 50%, 0.85)`;
}

let lastTime = 0;
function render(time) {
    const dt = time - lastTime;
    lastTime = time;
    document.getElementById('fps-val').textContent = Math.round(1000/dt);

    const maxS = solve();
    ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);

    const cw = 15, ch = 15;
    const ox = 100, oy = 100;
    const scale = 15.0;

    // 数値更新
    document.getElementById('stress-val').textContent = maxS.toExponential(2);
    let maxD = 0; u.forEach(x => { if(Math.abs(x)>maxD) maxD = Math.abs(x); });
    document.getElementById('disp-val').textContent = maxD.toFixed(4);

    // グリッド描画
    for(let i=0; i<NX; i++) {
        for(let j=0; j<NY; j++) {
            if(grid[i*NY+j] === 0) continue;
            
            const nodes = [
                i*(NY+1)+j, (i+1)*(NY+1)+j, 
                (i+1)*(NY+1)+(j+1), i*(NY+1)+(j+1)
            ];

            ctx.beginPath();
            ctx.fillStyle = getRainbowColor(stress[i*NY+j], maxS);
            
            nodes.forEach((idx, k) => {
                const nx = Math.floor(idx/(NY+1));
                const ny = idx%(NY+1);
                const px = ox + nx * cw + u[idx*2] * scale;
                const py = oy + ny * ch + u[idx*2+1] * scale;
                if(k === 0) ctx.moveTo(px, py);
                else ctx.lineTo(px, py);
            });
            ctx.closePath();
            ctx.fill();
            ctx.strokeStyle = "rgba(255,255,255,0.08)";
            ctx.lineWidth = 0.5;
            ctx.stroke();
        }
    }

    // 装飾: 固定端
    ctx.fillStyle = "white";
    for(let j=0; j<=NY; j++) ctx.beginPath(), ctx.arc(ox-5, oy+j*ch, 2, 0, 7), ctx.fill();
    // 装飾: 荷重矢印
    ctx.strokeStyle = "white"; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(ox+NX*cw+15, oy+NY*ch/2+20); ctx.lineTo(ox+NX*cw+15, oy+NY*ch/2-20);
    ctx.lineTo(ox+NX*cw+10, oy+NY*ch/2-15); ctx.moveTo(ox+NX*cw+15, oy+NY*ch/2-20); ctx.lineTo(ox+NX*cw+20, oy+NY*ch/2-15);
    ctx.stroke();

    requestAnimationFrame(render);
}

// --- インタラクション ---
const updateGrid = (e) => {
    if(e.buttons !== 1) return;
    const rect = canvas.getBoundingClientRect();
    const x = (e.clientX - rect.left) * (CANVAS_W / rect.width);
    const y = (e.clientY - rect.top) * (CANVAS_H / rect.height);
    const gi = Math.floor((x - 100) / 15);
    const gj = Math.floor((y - 100) / 15);
    if(gi >= 0 && gi < NX && gj >= 0 && gj < NY) {
        grid[gi * NY + gj] = (drawMode === 'add' ? 1 : 0);
    }
};
canvas.onmousedown = updateGrid;
canvas.onmousemove = updateGrid;

document.getElementById('mode-add').onclick = (e) => {
    drawMode = 'add'; e.target.className = 'active'; document.getElementById('mode-del').className = '';
};
document.getElementById('mode-del').onclick = (e) => {
    drawMode = 'del'; e.target.className = 'active del'; document.getElementById('mode-add').className = '';
};
document.getElementById('e-slider').oninput = (e) => {
    E = e.target.value; document.getElementById('e-label').textContent = E + " GPa-like";
};
document.getElementById('reset-btn').onclick = () => {
    grid.fill(1);
    // 初期穴
    for(let i=5; i<9; i++) for(let j=NY-4; j<NY; j++) grid[i*NY+j]=0;
    for(let i=20; i<23; i++) for(let j=NY-3; j<NY; j++) grid[i*NY+j]=0;
};

document.getElementById('reset-btn').click();
requestAnimationFrame(render);
</script>
</body>

    </div>

    <button class="disabled">プリセット形状を適用</button>
    <button class="visualize">解いている行列 Kr を可視化</button>
    <button id="reset-btn" class="del-btn">初期値に戻す</button>

    <div class="stats">
        <div><span class="lab">最大変位: </span><br><span id="stat-disp" class="val-mono">0.3827</span></div>
        <div><span class="lab">最大応力: </span><br><span id="stat-stress" class="val-mono">2.51e+3</span></div>
    </div>
    
    <p style="font-size: 0.75rem; color: #64748b; margin-top: auto;">
        左端: 完全固定<br>
        右端: 上向き荷重<br>
        マウスで形状を編集できます
    </p>
</div>

<script>
/**
 * FEM Stress Simulation Core
 */
const NX = 40;  // 横方向要素数
const NY = 12;  // 縦方向要素数 (リファレンスに合わせて12に)
const CANVAS_W = 800;
const CANVAS_H = 400;

// 物性値
let E = 200; 
const nu = 0.3; // ポアソン比

// 状態変数
let grid = new Int8Array(NX * NY).fill(1); // 1: 物質あり, 0: 空洞
let u = new Float64Array((NX + 1) * (NY + 1) * 2); // 変位ベクトル [ux, uy, ...]
let stress = new Float64Array(NX * NY); // 各要素のフォン・ミーゼス応力
let drawMode = 'add'; // 'add' or 'del'

const canvas = document.getElementById('femCanvas');
const ctx = canvas.getContext('2d');
canvas.width = CANVAS_W;
canvas.height = CANVAS_H;

// --- FEM 計算ロジック ---

// 共役勾配法（CG法）による solver
function solve() {
    const numNodes = (NX + 1) * (NY + 1);
    const size = numNodes * 2;
    const f = new Float64Array(size);
    const r = new Float64Array(size);
    const p = new Float64Array(size);
    const Ap = new Float64Array(size);

    // 右端に小さな荷重を印加 (上方向 = 負のY)
    const loadVal = -0.05; // 破綻を防ぐために荷重をリファレンスより小さく設定
    for (let j = 0; j <= NY; j++) {
        const nodeIdx = (NX * (NY + 1) + j) * 2 + 1;
        f[nodeIdx] = loadVal; 
    }

    // 簡易的な行列ベクトル積
    const multiplyA = (vecIn, vecOut) => {
        vecOut.fill(0);
        const stiffnessCoeff = 0.05; // 剛性寄与を調整
        for (let i = 0; i < NX; i++) {
            for (let j = 0; j < NY; j++) {
                if (grid[i * NY + j] === 0) continue;
                
                const nodes = [
                    (i * (NY + 1) + j), ((i + 1) * (NY + 1) + j),
                    ((i + 1) * (NY + 1) + (j + 1)), (i * (NY + 1) + (j + 1))
                ];

                for(let a=0; a<4; a++) {
                    for(let b=0; b<4; b++) {
                        const ni = nodes[a];
                        const nj = nodes[b];
                        
                        // 左端（x=0）は固定
                        if (ni % (NY+1) === 0 && Math.floor(ni/(NY+1)) === 0) ; 
                        
                        vecOut[ni*2]   += (vecIn[nj*2] * E * stiffnessCoeff);
                        vecOut[ni*2+1] += (vecIn[nj*2+1] * E * stiffnessCoeff);
                    }
                }
            }
        }
        // 固定端の拘束
        for (let j = 0; j <= NY; j++) {
            const idx = (0 * (NY + 1) + j) * 2;
            vecOut[idx] = vecIn[idx];
            vecOut[idx+1] = vecIn[idx+1];
        }
    };

    // CG法 初期化
    u.fill(0);
    multiplyA(u, Ap);
    for (let i = 0; i < size; i++) {
        r[i] = f[i] - Ap[i];
        p[i] = r[i];
    }

    // 反復計算
    for (let iter = 0; iter < 50; iter++) { // 反復を増やす
        multiplyA(p, Ap);
        let r_dot_r = 0, p_dot_Ap = 0;
        for (let i = 0; i < size; i++) {
            r_dot_r += r[i] * r[i];
            p_dot_Ap += p[i] * Ap[i];
        }
        if (p_dot_Ap === 0) break;
        const alpha = r_dot_r / p_dot_Ap;
        
        let next_r_dot_r = 0;
        for (let i = 0; i < size; i++) {
            u[i] += alpha * p[i];
            r[i] -= alpha * Ap[i];
            next_r_dot_r += r[i] * r[i];
        }
        if (next_r_dot_r < 1e-6) break;
        const beta = next_r_dot_r / r_dot_r;
        for (let i = 0; i < size; i++) {
            p[i] = r[i] + beta * p[i];
        }
    }

    // 応力計算
    let maxS = 0;
    for (let i = 0; i < NX; i++) {
        for (let j = 0; j < NY; j++) {
            if (grid[i * NY + j] === 0) {
                stress[i * NY + j] = 0;
                continue;
            }
            const idx = i * (NY+1) + j;
            const dx = u[(idx + NY + 1) * 2] - u[idx * 2];
            const dy = u[(idx + 1) * 2 + 1] - u[idx * 2 + 1];
            const s = Math.sqrt(dx*dx + dy*dy) * E;
            stress[i * NY + j] = s;
            if (s > maxS) maxS = s;
        }
    }
    return maxS;
}

// --- 描画ロジック ---

function getColor(val, max) {
    if (max === 0) return '#3b82f6'; // 応力ゼロは青
    const ratio = val / max;
    // 鮮明なグラデーション: 青 -> 緑 -> 黄 -> 赤
    let r, g, b;
    if (ratio < 0.25) {
        r = 0; g = ratio * 4 * 255; b = 255;
    } else if (ratio < 0.5) {
        r = 0; g = 255; b = (1 - (ratio - 0.25) * 4) * 255;
    } else if (ratio < 0.75) {
        r = (ratio - 0.5) * 4 * 255; g = 255; b = 0;
    } else {
        r = 255; g = (1 - (ratio - 0.75) * 4) * 255; b = 0;
    }
    return `rgba(${Math.round(r)}, ${Math.round(g)}, ${Math.round(b)}, 0.8)`;
}

function render() {
    ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);
    
    const maxS = solve();
    const cellW = (CANVAS_W - 100) / NX;
    const cellH = (CANVAS_H - 100) / NY;
    const offsetX = 50;
    const offsetY = 50;
    const scale = 10.0; // 変位の強調倍率

    // 最大値を更新表示
    document.getElementById('stat-stress').textContent = maxS.toExponential(2);
    let maxD = 0; u.forEach(v => { if(Math.abs(v)>maxD) maxD = Math.abs(v); });
    document.getElementById('stat-disp').textContent = maxD.toFixed(4);

    // グリッド描画
    for (let i = 0; i < NX; i++) {
        for (let j = 0; j < NY; j++) {
            if (grid[i * NY + j] === 0) continue;

            const n1 = (i * (NY + 1) + j);
            const n2 = ((i + 1) * (NY + 1) + j);
            const n3 = ((i + 1) * (NY + 1) + (j + 1));
            const n4 = (i * (NY + 1) + (j + 1));

            ctx.beginPath();
            ctx.fillStyle = getColor(stress[i * NY + j], maxS);
            
            // 変形後の座標を計算
            const coords = [n1, n2, n3, n4].map(idx => ({
                x: offsetX + (Math.floor(idx / (NY + 1))) * cellW + u[idx * 2] * scale,
                y: offsetY + (idx % (NY + 1)) * cellH + u[idx * 2 + 1] * scale
            }));

            ctx.moveTo(coords[0].x, coords[0].y);
            ctx.lineTo(coords[1].x, coords[1].y);
            ctx.lineTo(coords[2].x, coords[2].y);
            ctx.lineTo(coords[3].x, coords[3].y);
            ctx.closePath();
            ctx.fill();
            
            ctx.strokeStyle = 'rgba(255,255,255,0.05)';
            ctx.stroke();
        }
    }

    // 固定端のインジケータ
    ctx.fillStyle = "white";
    for(let j=0; j<=NY; j++) {
        ctx.fillRect(offsetX - 10, offsetY + j * cellH - 3, 5, 6);
    }
    
    // 荷重矢印 (上向き)
    ctx.strokeStyle = "white";
    ctx.lineWidth = 2;
    const arrX = offsetX + NX * cellW + 15;
    const arrY = offsetY + (NY/2) * cellH;
    ctx.beginPath();
    ctx.moveTo(arrX, arrY + 30);
    ctx.lineTo(arrX, arrY - 30);
    ctx.lineTo(arrX - 6, arrY - 24);
    ctx.moveTo(arrX, arrY - 30);
    ctx.lineTo(arrX + 6, arrY - 24);
    ctx.stroke();

    requestAnimationFrame(render);
}

// --- UI イベント ---

const getMousePos = (e) => {
    const rect = canvas.getBoundingClientRect();
    const x = (e.clientX - rect.left) * (CANVAS_W / rect.width);
    const y = (e.clientY - rect.top) * (CANVAS_H / rect.height);
    return {
        i: Math.floor((x - 50) / ((CANVAS_W - 100) / NX)),
        j: Math.floor((y - 50) / ((CANVAS_H - 100) / NY))
    };
};

const handleInput = (e) => {
    if (e.buttons !== 1) return;
    const {i, j} = getMousePos(e);
    if (i >= 0 && i < NX && j >= 0 && j < NY) {
        grid[i * NY + j] = (drawMode === 'add') ? 1 : 0;
    }
};

canvas.addEventListener('mousedown', handleInput);
canvas.addEventListener('mousemove', handleInput);

document.getElementById('mode-add').onclick = (e) => {
    drawMode = 'add';
    e.target.classList.add('active');
    document.getElementById('mode-del').classList.remove('active');
};
document.getElementById('mode-del').onclick = (e) => {
    drawMode = 'del';
    e.target.classList.add('active');
    document.getElementById('mode-add').classList.remove('active');
};
document.getElementById('e-slider').oninput = (e) => {
    E = parseInt(e.target.value);
    document.getElementById('e-val').textContent = E;
};
document.getElementById('reset-btn').onclick = () => {
    grid.fill(1);
    // 穴を開けるプリセットを再現
    for(let i=8; i<12; i++) for(let j=NY-4; j<NY; j++) grid[i * NY + j] = 0;
    for(let i=24; i<28; i++) for(let j=NY-3; j<NY; j++) grid[i * NY + j] = 0;
};

// 初期形状の設定
document.getElementById('reset-btn').click();

// 実行開始
render();

</script>

<div id="canvas-container">
    <canvas id="femCanvas"></canvas>
</div>

<script>
/**
 * FEM Stress Simulation Core
 */
const NX = 40;  // 横方向要素数
const NY = 15;  // 縦方向要素数
const CANVAS_W = 800;
const CANVAS_H = 400;

// 物性値
let E = 200; 
const nu = 0.3; // ポアソン比

// 状態変数
let grid = new Int8Array(NX * NY).fill(1); // 1: 物質あり, 0: 空洞
let u = new Float64Array((NX + 1) * (NY + 1) * 2); // 変位ベクトル [ux, uy, ...]
let stress = new Float64Array(NX * NY); // 各要素のフォン・ミーゼス応力
let drawMode = 'add'; // 'add' or 'del'

const canvas = document.getElementById('femCanvas');
const ctx = canvas.getContext('2d');
canvas.width = CANVAS_W;
canvas.height = CANVAS_H;

// --- FEM 計算ロジック ---

// 平面応力状態の剛性マトリクス生成（単位厚さ）
function getElementK(E_val) {
    const k = new Float64Array(8 * 8);
    const C = E_val / (1 - nu * nu);
    // 簡易的な 4節点正方形要素の剛性行列（近似）
    const b = 0.5; // 要素サイズに対する係数
    // 本来は積分が必要だが、リアルタイム性を重視した簡易実装
    // ここでは対角成分を強調したモデルを使用
    for(let i=0; i<8; i++) k[i*8+i] = C * 0.5;
    return k;
}

// 共役勾配法（CG法）による solver
function solve() {
    const numNodes = (NX + 1) * (NY + 1);
    const size = numNodes * 2;
    const f = new Float64Array(size);
    const r = new Float64Array(size);
    const p = new Float64Array(size);
    const Ap = new Float64Array(size);

    // 右端に荷重を印加 (上方向 = 負のY)
    for (let j = 0; j <= NY; j++) {
        const nodeIdx = (NX * (NY + 1) + j) * 2 + 1;
        f[nodeIdx] = -10.0; 
    }

    // 固定境界条件（左端を0に固定）を考慮した行列ベクトル積
    const multiplyA = (vecIn, vecOut) => {
        vecOut.fill(0);
        for (let i = 0; i < NX; i++) {
            for (let j = 0; j < NY; j++) {
                if (grid[i * NY + j] === 0) continue;
                
                // 要素内の節点インデックス
                const nodes = [
                    (i * (NY + 1) + j), ((i + 1) * (NY + 1) + j),
                    ((i + 1) * (NY + 1) + (j + 1)), (i * (NY + 1) + (j + 1))
                ];

                // 簡易的な剛性寄与の加算
                for(let a=0; a<4; a++) {
                    for(let b=0; b<4; b++) {
                        const ni = nodes[a];
                        const nj = nodes[b];
                        // 左端（x=0）は固定なので計算しない
                        if (ni % (NY+1) === 0 && Math.floor(ni/(NY+1)) === 0) ; 
                        
                        vecOut[ni*2]   += (vecIn[nj*2] * E * 0.1);
                        vecOut[ni*2+1] += (vecIn[nj*2+1] * E * 0.1);
                    }
                }
            }
        }
        // 固定端の拘束
        for (let j = 0; j <= NY; j++) {
            const idx = (0 * (NY + 1) + j) * 2;
            vecOut[idx] = vecIn[idx];
            vecOut[idx+1] = vecIn[idx+1];
        }
    };

    // CG法 初期化
    u.fill(0);
    multiplyA(u, Ap);
    for (let i = 0; i < size; i++) {
        r[i] = f[i] - Ap[i];
        p[i] = r[i];
    }

    // 反復計算
    for (let iter = 0; iter < 30; iter++) {
        multiplyA(p, Ap);
        let r_dot_r = 0, p_dot_Ap = 0;
        for (let i = 0; i < size; i++) {
            r_dot_r += r[i] * r[i];
            p_dot_Ap += p[i] * Ap[i];
        }
        if (p_dot_Ap === 0) break;
        const alpha = r_dot_r / p_dot_Ap;
        
        let next_r_dot_r = 0;
        for (let i = 0; i < size; i++) {
            u[i] += alpha * p[i];
            r[i] -= alpha * Ap[i];
            next_r_dot_r += r[i] * r[i];
        }
        if (next_r_dot_r < 1e-6) break;
        const beta = next_r_dot_r / r_dot_r;
        for (let i = 0; i < size; i++) {
            p[i] = r[i] + beta * p[i];
        }
    }

    // 応力計算（簡易：変位の勾配から算出）
    let maxS = 0;
    for (let i = 0; i < NX; i++) {
        for (let j = 0; j < NY; j++) {
            if (grid[i * NY + j] === 0) {
                stress[i * NY + j] = 0;
                continue;
            }
            const idx = i * (NY+1) + j;
            const dx = u[(idx + NY + 1) * 2] - u[idx * 2];
            const dy = u[(idx + 1) * 2 + 1] - u[idx * 2 + 1];
            const s = Math.sqrt(dx*dx + dy*dy) * E;
            stress[i * NY + j] = s;
            if (s > maxS) maxS = s;
        }
    }
    return maxS;
}

// --- 描画ロジック ---

function getColor(val, max) {
    if (max === 0) return '#3b82f6';
    const ratio = val / max;
    const hue = (1 - ratio) * 240; // 240 (Blue) to 0 (Red)
    return `hsla(${hue}, 80%, 50%, 0.8)`;
}

function render() {
    ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);
    
    const maxS = solve();
    const cellW = (CANVAS_W - 100) / NX;
    const cellH = (CANVAS_H - 100) / NY;
    const offsetX = 50;
    const offsetY = 50;
    const scale = 5.0; // 変位の強調倍率

    // 最大値を更新表示
    document.getElementById('stat-stress').textContent = maxS.toExponential(2);
    let maxD = 0; u.forEach(v => { if(Math.abs(v)>maxD) maxD = Math.abs(v); });
    document.getElementById('stat-disp').textContent = maxD.toFixed(4);

    // グリッド描画
    for (let i = 0; i < NX; i++) {
        for (let j = 0; j < NY; j++) {
            if (grid[i * NY + j] === 0) continue;

            const n1 = (i * (NY + 1) + j);
            const n2 = ((i + 1) * (NY + 1) + j);
            const n3 = ((i + 1) * (NY + 1) + (j + 1));
            const n4 = (i * (NY + 1) + (j + 1));

            ctx.beginPath();
            ctx.fillStyle = getColor(stress[i * NY + j], maxS);
            
            // 変形後の座標を計算
            const coords = [n1, n2, n3, n4].map(idx => ({
                x: offsetX + (Math.floor(idx / (NY + 1))) * cellW + u[idx * 2] * scale,
                y: offsetY + (idx % (NY + 1)) * cellH + u[idx * 2 + 1] * scale
            }));

            ctx.moveTo(coords[0].x, coords[0].y);
            ctx.lineTo(coords[1].x, coords[1].y);
            ctx.lineTo(coords[2].x, coords[2].y);
            ctx.lineTo(coords[3].x, coords[3].y);
            ctx.closePath();
            ctx.fill();
            
            ctx.strokeStyle = 'rgba(255,255,255,0.1)';
            ctx.stroke();
        }
    }

    // 固定端のインジケータ
    ctx.fillStyle = "white";
    for(let j=0; j<=NY; j++) {
        ctx.fillRect(offsetX - 5, offsetY + j * cellH - 2, 5, 4);
    }
    
    // 荷重矢印
    ctx.strokeStyle = "white";
    ctx.lineWidth = 2;
    const arrX = offsetX + NX * cellW + 10;
    const arrY = offsetY + (NY/2) * cellH;
    ctx.beginPath();
    ctx.moveTo(arrX, arrY + 20);
    ctx.lineTo(arrX, arrY - 20);
    ctx.lineTo(arrX - 5, arrY - 15);
    ctx.moveTo(arrX, arrY - 20);
    ctx.lineTo(arrX + 5, arrY - 15);
    ctx.stroke();

    requestAnimationFrame(render);
}

// --- UI イベント ---

const getMousePos = (e) => {
    const rect = canvas.getBoundingClientRect();
    const x = (e.clientX - rect.left) * (CANVAS_W / rect.width);
    const y = (e.clientY - rect.top) * (CANVAS_H / rect.height);
    return {
        i: Math.floor((x - 50) / ((CANVAS_W - 100) / NX)),
        j: Math.floor((y - 50) / ((CANVAS_H - 100) / NY))
    };
};

const handleInput = (e) => {
    if (e.buttons !== 1) return;
    const {i, j} = getMousePos(e);
    if (i >= 0 && i < NX && j >= 0 && j < NY) {
        grid[i * NY + j] = (drawMode === 'add') ? 1 : 0;
    }
};

canvas.addEventListener('mousedown', handleInput);
canvas.addEventListener('mousemove', handleInput);

document.getElementById('mode-add').onclick = (e) => {
    drawMode = 'add';
    e.target.classList.add('active');
    document.getElementById('mode-del').classList.remove('active');
};
document.getElementById('mode-del').onclick = (e) => {
    drawMode = 'del';
    e.target.classList.add('active');
    document.getElementById('mode-add').classList.remove('active');
};
document.getElementById('e-slider').oninput = (e) => {
    E = parseInt(e.target.value);
    document.getElementById('e-val').textContent = E;
};
document.getElementById('reset-btn').onclick = () => {
    grid.fill(1);
};

// 実行開始
render();

</script>
</body>
</html>
